<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كارلي — اطلب قطع غيار سيارتك</title>
<style>
  :root {
    --navy: #0F2A4A; --navy-2: #1B3D63; --accent: #1D9E75;
    --bg: #F5F6F8; --card: #FFFFFF; --line: #E2E6EC;
    --text: #11243B; --muted: #6B7A8D; --danger: #C0392B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", Tahoma, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6;
    padding: 16px; max-width: 640px; margin: 0 auto;
  }
  header { text-align: center; padding: 20px 0 12px; }
  header h1 { color: var(--navy); font-size: 26px; font-weight: 700; }
  header p { color: var(--muted); font-size: 14px; margin-top: 4px; }
  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 18px; margin-bottom: 14px;
  }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  input, select, textarea {
    width: 100%; padding: 11px 12px; border: 1px solid var(--line);
    border-radius: 9px; font-size: 15px; font-family: inherit; background: #FBFCFD;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field { margin-bottom: 12px; }
  .item-block {
    border: 1px dashed var(--line); border-radius: 11px;
    padding: 14px; margin-bottom: 10px; position: relative; background: #FAFBFC;
  }
  .item-block .remove {
    position: absolute; top: 10px; left: 10px; background: none; border: none;
    color: var(--danger); cursor: pointer; font-size: 18px; width: auto; padding: 0;
  }
  .btn {
    background: var(--navy); color: #fff; border: none; border-radius: 10px;
    padding: 13px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%;
    font-family: inherit; transition: background .2s;
  }
  .btn:hover { background: var(--navy-2); }
  .btn-ghost { background: #EEF2F6; color: var(--navy); }
  .btn-ghost:hover { background: #E2E8EF; }
  .preview { max-width: 80px; max-height: 80px; border-radius: 8px; margin-top: 8px; display: none; }
  .hidden { display: none; }
  /* العداد */
  .countdown-wrap { text-align: center; padding: 30px 0; }
  /* أنيميشن ثلاثي الأبعاد لقطعة الغيار (ترس دوّار) */
  .gear3d-scene { perspective: 600px; height: 110px; display:flex; align-items:center; justify-content:center; margin-bottom: 16px; }
  .gear3d { position: relative; width: 90px; height: 90px; transform-style: preserve-3d; animation: spin3d 3s linear infinite; }
  .gear-face { position:absolute; width:90px; height:90px; display:flex; align-items:center; justify-content:center; font-size:80px; line-height:1; }
  .gear-front { transform: translateZ(8px); }
  .gear-back { transform: translateZ(-8px) rotateY(180deg); }
  @keyframes spin3d {
    0%   { transform: rotateY(0deg) rotateX(15deg); }
    100% { transform: rotateY(360deg) rotateX(15deg); }
  }
  .countdown {
    font-size: 64px; font-weight: 800; color: var(--navy);
    font-variant-numeric: tabular-nums;
  }
  .countdown small { display: block; font-size: 15px; color: var(--muted); font-weight: 500; }
  .tip {
    color: var(--navy);
    font-size: 17px;
    font-weight: 600;
    margin-top: 20px;
    background: #eef4ff;
    border: 1px solid #d6e4ff;
    border-radius: 12px;
    padding: 14px 18px;
    line-height: 1.6;
  }
  /* النتائج */
  .item-result { margin-bottom: 18px; }
  .item-result h3 { color: var(--navy); font-size: 16px; margin-bottom: 8px; }
  .offer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px; border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px;
  }
  .offer.best { border-color: var(--accent); border-width: 2px; background: #F0FAF6; }
  .offer .price { font-size: 20px; font-weight: 700; color: var(--navy); }
  .offer .meta { font-size: 12px; color: var(--muted); }
  .offer button {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 8px 16px; font-weight: 600; cursor: pointer; width: auto; font-family: inherit;
  }
  .badge { background: var(--accent); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 6px; }
</style>
</head>
<body>
<header style="position:relative">
  <button id="langToggle" onclick="toggleLang()" style="position:absolute;top:0;inset-inline-end:0;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:6px 14px;font-size:14px;font-weight:600;color:var(--navy);cursor:pointer">English</button>
  <h1 data-i18n="appTitle">كارلي لقطع الغيار</h1>
  <p data-i18n="appSubtitle">أرسل طلبك، نجمع لك أفضل الأسعار خلال 90 ثانية — مجانًا</p>
</header>

<!-- مرحلة 1: النموذج -->
<div id="formStage">
  <div class="card">
    <div class="field">
      <label data-i18n="waNumber">رقمك على واتساب</label>
      <input id="whatsapp" type="tel" placeholder="مثال: 0501234567" data-i18n-ph="waPlaceholder" inputmode="numeric">
    </div>
    <div class="field">
      <label><input type="checkbox" id="isWorkshop" style="width:auto;display:inline"> <span data-i18n="isWorkshop">أنا ورشة / تاجر</span></label>
    </div>
    <div class="row">
      <div class="field">
        <label data-i18n="brand">الشركة</label>
        <select id="brand"><option value="" data-i18n="choose">اختر...</option></select>
      </div>
      <div class="field">
        <label data-i18n="model">الموديل</label>
        <select id="model"><option value="" data-i18n="chooseBrandFirst">اختر الشركة أولًا</option></select>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label data-i18n="year">سنة الصنع</label>
        <input id="year" type="number" placeholder="2020" inputmode="numeric">
      </div>
      <div class="field">
        <label data-i18n="vin">رقم الشاصي (اختياري)</label>
        <input id="vin" type="text" placeholder="VIN">
      </div>
    </div>
  </div>

  <div class="card">
    <label data-i18n="requestedParts" style="font-size:15px;color:var(--navy);margin-bottom:12px">القطع المطلوبة</label>
    <div id="itemsContainer"></div>
    <button class="btn btn-ghost" onclick="addItem()" data-i18n="addAnotherPart" style="margin-top:6px">+ إضافة قطعة أخرى</button>
  </div>

  <button class="btn" onclick="submitRequest()" data-i18n="submitRequest">إرسال الطلب وبدء البحث</button>
</div>

<!-- مرحلة 2: العداد -->
<div id="countdownStage" class="hidden">
  <div class="card countdown-wrap">
    <div class="gear3d-scene">
      <div class="gear3d">
        <div class="gear-face gear-front">⚙️</div>
        <div class="gear-face gear-back">⚙️</div>
      </div>
    </div>
    <div class="countdown"><span id="counter">90</span><small data-i18n="countdownSec">ثانية — نجمع العروض من الموردين</small></div>
    <p id="orderNo" style="display:none;color:var(--navy);font-weight:600;font-size:14px;margin-top:10px;background:#f0f0f5;border-radius:8px;padding:8px 14px;display:inline-block"></p>
    <p class="tip" id="tip" data-def="1" style="transition:opacity .3s">جارٍ إرسال طلبك لأفضل الموردين المتخصصين...</p>
  </div>
</div>

<!-- مرحلة 3: النتائج -->
<div id="resultsStage" class="hidden">
  <div class="card">
    <h2 data-i18n="bestOffers" style="color:var(--navy);font-size:18px;margin-bottom:4px">أفضل العروض</h2>
    <p data-i18n="chooseMethod" style="color:var(--muted);font-size:13px;margin-bottom:14px">اختر الطريقة التي تناسبك</p>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button class="btn btn-ghost" id="modeBasket" onclick="setMode('basket',this)" data-i18n="oneSupplierAll" style="flex:1">مورد واحد للكل</button>
      <button class="btn btn-ghost" id="modeItem" onclick="setMode('item',this)" data-i18n="cheapestPerPart" style="flex:1">أرخص لكل قطعة</button>
    </div>
    <div id="basketView"></div>
    <div id="itemView" class="hidden"></div>
    <button class="btn hidden" id="confirmBtn" onclick="confirmChoice()" data-i18n="confirmChoice" style="margin-top:14px">تأكيد الاختيار</button>
  </div>
</div>

<script>
// ===== نظام اللغة (عربي/إنجليزي) =====
const I18N = {
  appTitle:        { ar: 'كارلي لقطع الغيار', en: 'Carly Spare Parts' },
  appSubtitle:     { ar: 'أرسل طلبك، نجمع لك أفضل الأسعار خلال 90 ثانية — مجانًا', en: 'Send your request, we gather the best prices in 90 seconds — free' },
  waNumber:        { ar: 'رقمك على واتساب', en: 'Your WhatsApp number' },
  waPlaceholder:   { ar: 'مثال: 0501234567', en: 'e.g. 0501234567' },
  isWorkshop:      { ar: 'أنا ورشة / تاجر', en: "I'm a workshop / dealer" },
  brand:           { ar: 'الشركة', en: 'Make' },
  model:           { ar: 'الموديل', en: 'Model' },
  choose:          { ar: 'اختر...', en: 'Choose...' },
  chooseBrandFirst:{ ar: 'اختر الشركة أولًا', en: 'Choose make first' },
  year:            { ar: 'سنة الصنع', en: 'Year' },
  vin:             { ar: 'رقم الشاصي (اختياري)', en: 'Chassis number (optional)' },
  requestedParts:  { ar: 'القطع المطلوبة', en: 'Requested parts' },
  addAnotherPart:  { ar: '+ إضافة قطعة أخرى', en: '+ Add another part' },
  submitRequest:   { ar: 'إرسال الطلب وبدء البحث', en: 'Submit request & start search' },
  countdownSec:    { ar: 'ثانية — نجمع العروض من الموردين', en: 'sec — gathering offers from suppliers' },
  tipSending:      { ar: 'جارٍ إرسال طلبك لأفضل الموردين المتخصصين...', en: 'Sending your request to the best specialized suppliers...' },
  bestOffers:      { ar: 'أفضل العروض', en: 'Best offers' },
  chooseMethod:    { ar: 'اختر الطريقة التي تناسبك', en: 'Choose the method that suits you' },
  oneSupplierAll:  { ar: 'مورد واحد للكل', en: 'One supplier for all' },
  cheapestPerPart: { ar: 'أرخص لكل قطعة', en: 'Cheapest per part' },
  confirmChoice:   { ar: 'تأكيد الاختيار', en: 'Confirm choice' },
  section:         { ar: 'القسم', en: 'Category' },
  part:            { ar: 'القطعة', en: 'Part' },
  chooseCatFirst:  { ar: 'اختر القسم أولاً', en: 'Choose category first' },
  typeOrChoose:    { ar: 'اكتب أو اختر القطعة...', en: 'Type or choose the part...' },
  note:            { ar: 'توضيح (اختياري)', en: 'Note (optional)' },
  notePlaceholder: { ar: 'مثال: أمامي يمين، خلفي يسار...', en: 'e.g. front right, rear left...' },
  type:            { ar: 'النوع', en: 'Condition' },
  partImage:       { ar: 'صورة القطعة (اختياري)', en: 'Part image (optional)' },
  partNo:          { ar: 'القطعة رقم', en: 'Part #' },
  remove:          { ar: '✕ حذف', en: '✕ Remove' },
  chooseCat:       { ar: '— اختر القسم —', en: '— Choose category —' },
  willSendAsTyped: { ar: '✓ ستُرسل القطعة كما كتبتها', en: '✓ Will send the part as you typed it' },
  confirmPartHint: { ar: '⚠️ اختر قطعة من القائمة، أو اضغط "➕ إضافة" لإرسالها كما كتبت', en: '⚠️ Choose a part from the list, or tap "➕ Add" to send as typed' },
  alertNotFound:   { ar: 'الطلب غير موجود', en: 'Order not found' },
  alertOpenFail:   { ar: 'تعذّر فتح الطلب، حاول مجددًا', en: 'Could not open the order, try again' },
  alertEnterPhone: { ar: 'أدخل رقمك واختر الشركة', en: 'Enter your number and choose the make' },
  alertChoosePart: { ar: 'اختر قطعة واحدة على الأقل: حدّد القسم ثم القطعة.', en: 'Choose at least one part: select category then part.' },
  alertSendFail:   { ar: 'تعذّر إرسال الطلب، حاول مجددًا', en: 'Could not send the request, try again' },
  alertChooseSupplier: { ar: 'اختر موردًا', en: 'Choose a supplier' },
  alertChooseOffer:{ ar: 'اختر عرضًا واحدًا على الأقل', en: 'Choose at least one offer' },
  newPartRequest:  { ar: '🔍 طلب قطعة جديدة', en: '🔍 New part request' },
  newRequest:      { ar: '🔍 إرسال طلب جديد', en: '🔍 Send new request' },
  orderConfirmed:  { ar: 'تم تأكيد طلبك ✓', en: 'Your order is confirmed ✓' },
  willContactYou:  { ar: 'سيتواصل معك', en: 'Will contact you' },
  contactViaWa:    { ar: 'ستصلك بياناتهم عبر الواتساب', en: 'Their details will reach you via WhatsApp' },
  yourOrderNo:     { ar: '📋 رقم طلبك:', en: '📋 Your order no.:' },
  alreadyConfirmed:{ ar: 'تم تأكيد هذا الطلب مسبقًا ✓', en: 'This order was already confirmed ✓' },
  expiredTitle:    { ar: 'انتهت صلاحية العروض ⏳', en: 'Offers expired ⏳' },
  expiredBody:     { ar: 'عذرًا، انتهت مهلة اختيار العروض لطلبك', en: 'Sorry, the offer selection window for your order has ended' },
  expiredHint:     { ar: 'الأسعار تتغيّر بسرعة، لذا نطلب منك إرسال طلب جديد للحصول على أحدث العروض.', en: 'Prices change fast, so please send a new request for the latest offers.' },
  cheapest:        { ar: 'الأرخص', en: 'Cheapest' },
  selected:        { ar: 'مختار', en: 'Selected' },
  reply:           { ar: 'رد', en: 'reply' },
  rating:          { ar: 'تقييم', en: 'rating' },
  coversParts:     { ar: 'يغطي', en: 'covers' },
  ofParts:         { ar: 'من', en: 'of' },
  partsUnit:       { ar: 'قطعة', en: 'parts' },
  currency:        { ar: 'درهم', en: 'AED' },
  noOffersYet:     { ar: 'لم تصل عروض بعد.', en: 'No offers yet.' },
  noOffers:        { ar: 'لا عروض', en: 'No offers' },
  partLabel:       { ar: 'القطعة', en: 'Part' },
  secShort:        { ar: 'ث', en: 's' },
};

let LANG = (function() {
  try { return localStorage.getItem('carly_lang') || 'ar'; } catch { return 'ar'; }
})();

function t(key) {
  const e = I18N[key];
  return e ? (e[LANG] || e.ar) : key;
}

function setLang(lang) {
  LANG = lang;
  try { localStorage.setItem('carly_lang', lang); } catch {}
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  const tg = document.getElementById('langToggle');
  if (tg) tg.textContent = lang === 'ar' ? 'English' : 'عربي';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (I18N[k]) el.textContent = t(k);
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const k = el.getAttribute('data-i18n-ph');
    if (I18N[k]) el.placeholder = t(k);
  });
  refreshDynamicTexts();
}

function toggleLang() { setLang(LANG === 'ar' ? 'en' : 'ar'); }

function refreshDynamicTexts() {
  if (META && META.brandsI18n && typeof fillBrandsSelect === 'function') fillBrandsSelect();
  // ترجمة عناصر القطع الموجودة دون مسح إدخالات المستخدم
  document.querySelectorAll('#itemsContainer .item-block').forEach(b => {
    // عناوين الحقول (labels بالترتيب: القسم، القطعة، التوضيح، النوع، الصورة)
    const labels = b.querySelectorAll('.field > label');
    const keys = ['section', 'part', 'note', 'type', 'partImage'];
    labels.forEach((lb, i) => { if (keys[i]) lb.textContent = t(keys[i]); });
    // placeholder خانة البحث
    const search = b.querySelector('.part-search');
    if (search) search.placeholder = search.disabled ? t('chooseCatFirst') : t('typeOrChoose');
    // placeholder التوضيح
    const note = b.querySelector('.part-note');
    if (note) note.placeholder = t('notePlaceholder');
    // إعادة بناء خيارات القسم (مع الحفاظ على المختار)
    const catSel = b.querySelector('.part-category');
    if (catSel) {
      const curCat = catSel.value;
      const cats = META.categoriesI18n || (META.categoryNames || []).map(c => ({ ar: c, en: c }));
      catSel.innerHTML = `<option value="">${t('chooseCat')}</option>` +
        cats.map(c => { const ar = c.ar || c; const label = LANG === 'en' ? (c.en || ar) : ar; return `<option value="${ar}">${label}</option>`; }).join('');
      catSel.value = curCat;
    }
    // إعادة بناء خيارات النوع (الحالة)
    const condSel = b.querySelector('.part-condition');
    if (condSel) {
      const curCond = condSel.value;
      condSel.innerHTML = (META.conditions || []).map(c => {
        const label = (LANG === 'en' && META.conditionEn && META.conditionEn[c]) ? META.conditionEn[c] : c;
        return `<option value="${c}">${label}</option>`;
      }).join('');
      condSel.value = curCond;
    }
    // تحديث _parts (قائمة البحث) للقسم الحالي باللغة الجديدة
    if (catSel && catSel.value && search) {
      const c = (META.categoriesI18n || []).find(x => x.ar === catSel.value);
      if (c) search._parts = c.parts.slice();
      // لو فيه قطعة مختارة، حدّث النص المعروض
      const hidden = b.querySelector('.part-value');
      if (hidden && hidden.value && c) {
        const found = c.parts.find(p => p.ar === hidden.value);
        if (found) search.value = LANG === 'en' ? (found.en || found.ar) : found.ar;
      }
    }
  });
  if (typeof renumberItems === 'function') renumberItems();
  const tip = document.getElementById('tip');
  if (tip && tip.dataset.def === '1') {
    tip.textContent = t('tipSending');
  } else if (tip && window._tipState) {
    // في صفحة العداد: أعد بناء النصائح باللغة الجديدة واعرض وحدة فورًا
    window._tipState.rebuild();
    const tips = window._tipState.tips;
    if (tips && tips.length) tip.textContent = tips[0];
  }
}

let META = { brands: [], brandModels: {}, conditions: [], partCategories: {}, categoryNames: [], countdown: 90 };
let currentItemIds = [];

async function loadMeta() {
  const res = await fetch('/api/meta');
  META = await res.json();
  fillBrandsSelect();
  addItem();
  setLang(LANG); // طبّق اللغة المحفوظة على كل العناصر
  // لو الرابط فيه ?order=CARLY-21 → افتح صفحة نتائج الطلب مباشرة
  const params = new URLSearchParams(location.search);
  const order = params.get('order');
  if (order) openOrderFromLink(order);
}

// تعبئة قائمة الماركات بالاسم حسب اللغة (القيمة تبقى عربية للتخزين)
function fillBrandsSelect() {
  const bsel = document.getElementById('brand');
  if (!bsel) return;
  const cur = bsel.value;
  const list = META.brandsI18n || META.brands.map(b => ({ ar: b, en: b }));
  bsel.innerHTML = `<option value="">${t('choose')}</option>` +
    list.map(b => {
      const ar = b.ar || b;
      const label = LANG === 'en' ? (b.en || ar) : ar;
      return `<option value="${ar}">${label}</option>`;
    }).join('');
  if (cur) bsel.value = cur;
}

// فتح طلب موجود عبر رقمه (من رابط الواتساب)
async function openOrderFromLink(orderNumber) {
  try {
    const data = await (await fetch('/api/orders/' + encodeURIComponent(orderNumber))).json();
    if (!data.found) { alert(t('alertNotFound')); return; }
    // لو منتهي الصلاحية → صفحة "انتهت الصلاحية"
    if (data.validity && data.validity.expired) {
      showExpiredPage(data.order_number);
      return;
    }
    // لو محسوم مسبقًا → رسالة أنه تم
    if (data.validity && data.validity.chosen) {
      document.getElementById('formStage').classList.add('hidden');
      document.getElementById('resultsStage').classList.remove('hidden');
      document.getElementById('resultsStage').innerHTML =
        `<div class="card" style="text-align:center"><h2 style="color:var(--accent)">${t('alreadyConfirmed')}</h2>
         <p style="margin-top:10px;color:var(--navy);font-weight:600">📋 ${data.order_number}</p>
         <button class="btn" onclick="resetToStart()" style="margin-top:18px">${t('newPartRequest')}</button></div>`;
      return;
    }
    // غير ذلك: اعرض العروض للاختيار
    currentRequestId = data.request.id;
    currentItemIds = data.items.map(it => it.id);
    document.getElementById('formStage').classList.add('hidden');
    document.getElementById('countdownStage').classList.add('hidden');
    showResults();
  } catch (e) {
    alert(t('alertOpenFail'));
  }
}

// صفحة انتهاء صلاحية العروض
function showExpiredPage(orderNo) {
  document.getElementById('formStage').classList.add('hidden');
  document.getElementById('countdownStage').classList.add('hidden');
  const stage = document.getElementById('resultsStage');
  stage.classList.remove('hidden');
  stage.innerHTML =

// حذف قطعة ثم إعادة ترقيم العناوين (القطعة رقم 1، 2، 3...)
function removeItem(blockId) {
  const el = document.getElementById(blockId);
  if (el) el.remove();
  renumberItems();
}

// تُعيد ترقيم عناوين القطع حسب ترتيبها الحالي
function renumberItems() {
  const blocks = document.querySelectorAll('#itemsContainer .item-block');
  blocks.forEach((b, i) => {
    const title = b.querySelector('.item-title');
    if (title) title.textContent = t('partNo') + ' ' + (i + 1);

// عند اختيار القسم: نفعّل خانة بحث القطعة ونخزّن قطع القسم عليها
function fillParts(sel) {
  const block = sel.closest('.item-block');
  const search = block.querySelector('.part-search');
  const cat = sel.value; // القيمة عربية دائمًا
  // نجلب القطع ثنائية اللغة للقسم المختار
  let parts = [];
  if (META.categoriesI18n) {
    const c = META.categoriesI18n.find(x => x.ar === cat);
    parts = c ? c.parts.slice() : [];
  } else {
    parts = ((META.partCategories && META.partCategories[cat]) || []).map(p => ({ ar: p, en: p }));
  }
  search._parts = parts;          // [{ar, en}]
  search.disabled = !cat;
  search.value = '';
  block.querySelector('.part-value').value = '';
  search.placeholder = cat ? t('typeOrChoose') : t('chooseCatFirst');
  hideSuggestions(search);
  block.querySelector('.part-hint').style.display = 'none';
}

// بحث/عرض الاقتراحات أثناء الكتابة
function onPartSearch(input) {
  const block = input.closest('.item-block');
  const box = block.querySelector('.part-suggestions');
  const hint = block.querySelector('.part-hint');
  const hidden = block.querySelector('.part-value');
  const parts = input._parts || []; // [{ar, en}]
  const q = input.value.trim();
  const ql = q.toLowerCase();

  // أي تعديل يدوي يُلغي الاختيار المخزّن حتى يُعاد تأكيده
  hidden.value = '';

  // الاسم المعروض حسب اللغة
  const disp = p => (LANG === 'en' ? (p.en || p.ar) : p.ar);
  // الفلترة تطابق العربي والإنجليزي معًا
  const matches = q
    ? parts.filter(p => p.ar.includes(q) || (p.en || '').toLowerCase().includes(ql))
    : parts;

  const esc = s => String(s).replace(/'/g, "\\'");
  let html = '';
  if (matches.length) {
    html = matches.map(p =>
      `<div class="sug-item" style="padding:10px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0"
            onmousedown="pickPart(this,'${esc(p.ar)}','${esc(disp(p))}')">${disp(p)}</div>`
    ).join('');
  }
  // لو فيه نص مكتوب وما يطابق أي قطعة تمامًا → خيار "إضافة ما كتبه"
  const exact = parts.some(p => p.ar === q || (p.en || '').toLowerCase() === ql);
  if (q && !exact) {
    const addLabel = LANG === 'en' ? `➕ Add "${q}" as a new part` : `➕ إضافة "${q}" كقطعة جديدة`;
    html += `<div class="sug-item sug-add" style="padding:10px 12px;cursor:pointer;background:#eef6ff;font-weight:600;color:var(--navy)"
                  onmousedown="pickCustom(this,'${esc(q)}')">${addLabel}</div>`;
  }

  if (html) { box.innerHTML = html; box.style.display = 'block'; }
  else { box.style.display = 'none'; }
  hint.style.display = 'none';
}

// اختيار قطعة من القائمة
function pickPart(el, arValue, dispName) {
  const block = el.closest('.item-block');
  block.querySelector('.part-search').value = dispName || arValue;
  block.querySelector('.part-value').value = arValue; // القيمة المخزّنة عربية دائمًا
  const box = block.querySelector('.part-suggestions');
  box.style.display = 'none';
  const hint = block.querySelector('.part-hint');
  hint.style.display = 'none';
}

// إضافة قطعة كتبها العميل (غير موجودة في القائمة)
function pickCustom(el, name) {
  const block = el.closest('.item-block');
  block.querySelector('.part-search').value = name;
  block.querySelector('.part-value').value = name;
  const box = block.querySelector('.part-suggestions');
  box.style.display = 'none';
  const hint = block.querySelector('.part-hint');
  hint.textContent = t('willSendAsTyped');
  hint.style.color = '#2a8a4a';
  hint.style.display = 'block';
}

// إخفاء الاقتراحات (مع تأخير ليُسجَّل النقر) + تلميح لو نسي يؤكّد
function hideSuggestions(input) {
  const block = input.closest('.item-block');
  const box = block.querySelector('.part-suggestions');
  setTimeout(() => { if (box) box.style.display = 'none'; }, 150);
  setTimeout(() => {
    const hidden = block.querySelector('.part-value');
    const search = block.querySelector('.part-search');
    const hint = block.querySelector('.part-hint');
    if (search.value.trim() && !hidden.value) {
      hint.textContent = t('confirmPartHint');
      hint.style.color = '#c0392b';
      hint.style.display = 'block';
    }
  }, 250);
}

function previewImg(input) {
  const img = input.parentElement.querySelector('.preview');
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; img.style.display = 'block'; img.dataset.b64 = e.target.result; };
    reader.readAsDataURL(input.files[0]);
  }
}

async function submitRequest() {
  const whatsapp = document.getElementById('whatsapp').value.trim();
  const brand = document.getElementById('brand').value;
  if (!whatsapp || !brand) { alert(t('alertEnterPhone')); return; }

  const items = [];
  const incompleteParts = []; // أرقام القطع الناقصة (لتنبيه دقيق)
  document.querySelectorAll('.item-block').forEach((b, idx) => {
    const partNum = idx + 1;
    // اسم القطعة المؤكّدة (من اختيار قائمة أو إضافة يدوية)
    let name = (b.querySelector('.part-value')?.value || '').trim();
    // احتياط: لو كتب نصًا في خانة البحث ولم يؤكّده، نعتبره اسم القطعة
    if (!name) {
      const typed = (b.querySelector('.part-search')?.value || '').trim();
      if (typed) name = typed;
    }
    const cat = b.querySelector('.part-category');
    const hasCategory = cat && cat.value;
    // قطعة ناقصة: اختار قسمًا لكن بلا اسم قطعة
    if (!name) {
      if (hasCategory) incompleteParts.push(partNum);
      return;
    }
    const note = (b.querySelector('.part-note')?.value || '').trim();
    const img = b.querySelector('.preview');
    items.push({
      part_name: name,
      part_condition: b.querySelector('.part-condition').value,
      note: note,
      image_url: img.dataset.b64 || '',
    });
  });

  // تحقق صارم: لو فيه قطعة ناقصة، امنع الإرسال ووجّه العميل بدقة
  if (incompleteParts.length > 0) {
    const list = incompleteParts.join(LANG === 'en' ? ', ' : '، ');
    const msg = LANG === 'en'
      ? `Part # ${list} is incomplete.\n\nType the part name and choose it from the list, or tap "➕ Add" to send it as typed.\nThen submit the request.`
      : `القطعة رقم ${list} غير مكتملة.\n\nاكتب اسم القطعة واختَرها من القائمة، أو اضغط "➕ إضافة" لإرسالها كما كتبتها.\nثم أرسل الطلب.`;
    alert(msg);
    return;
  }
  if (!items.length) { alert(t('alertChoosePart')); return; }

  const payload = {
    whatsapp, name: '', is_workshop: document.getElementById('isWorkshop').checked,
    brand, model: document.getElementById('model').value,
    year: parseInt(document.getElementById('year').value, 10) || null,
    vin: document.getElementById('vin').value.trim(), items,
  };

  // افتح صفحة العداد فورًا (لا ننتظر بثّ السيرفر للموردين) — تجربة أسرع للعميل
  window.requestedParts = items.map(i => i.part_name);
  currentRequestId = null;
  currentItemIds = [];
  startCountdown();

  // أرسل الطلب في الخلفية؛ نحدّث المعرّفات عند وصول الرد
  try {
    const res = await fetch('/api/requests', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.error) { alert(data.error); backToForm(); return; }
    currentItemIds = data.itemIds;
    currentRequestId = data.requestId;
    window.suppliersNotified = data.suppliers_notified || 0;
    // عرض رقم الطلبية للعميل
    if (data.order_number) {
      const el = document.getElementById('orderNo');
      el.textContent = t('yourOrderNo') + ' ' + data.order_number;
      el.style.display = 'inline-block';
    }
  } catch (e) {
    alert(t('alertSendFail')); backToForm();
  }
}

  'رديتر': [{ ar: '🌡️ افحص مستوى سائل التبريد دوريًا.', en: '🌡️ Check coolant level regularly.' }],
};
const GENERIC_TIPS = [
  { ar: '🔍 نتواصل مع الموردين المتخصصين في قطعتك...', en: '🔍 Contacting suppliers specialized in your part...' },
  { ar: '💰 نقارن الأسعار تلقائيًا لنوفّر لك الأفضل...', en: '💰 Comparing prices automatically to get you the best...' },
  { ar: '⭐ نرتّب العروض حسب السعر والتقييم...', en: '⭐ Ranking offers by price and rating...' },
  { ar: '✅ كل موردينا معتمدون لدى كارلي.', en: '✅ All our suppliers are verified by Carly.' },

function buildTips() {
  const parts = window.requestedParts || []; // أسماء عربية (القيمة المخزّنة)
  const tips = [];
  for (const p of parts) {
    for (const key in PART_TIPS) {
      if (p.includes(key)) { tips.push(...PART_TIPS[key]); break; }
    }
  }
  const pool = tips.length ? tips.concat(GENERIC_TIPS) : GENERIC_TIPS.slice();
  // أرجِع النص حسب اللغة الحالية
  return pool.map(tp => (typeof tp === 'string' ? tp : (tp[LANG] || tp.ar)));
}

async function checkOffersReady() {
  // تعتمد على نقطة /status الذكية في الخادم (تحسب: ردّ الجميع أو انتهاء المهلة)
  if (!currentRequestId) return null; // الطلب لم يُسجّل بعد (البثّ في الخلفية)
  try {
    const st = await (await fetch('/api/requests/' + currentRequestId + '/status')).json();
    return st; // { ready, seconds_left, items }
  } catch { return null; }
}

function startCountdown() {
  document.getElementById('formStage').classList.add('hidden');
  document.getElementById('countdownStage').classList.remove('hidden');
  let tips = buildTips();
  let tipIdx = 0;
  window._tipState = { get tips() { return tips; }, get idx() { return tipIdx; }, rebuild() { tips = buildTips(); } };
  const counter = document.getElementById('counter');
  const tip = document.getElementById('tip');
  tip.dataset.def = '0'; // لم تعد النصيحة الافتراضية
  tip.textContent = tips[0];

  // تدوير النصائح كل 6 ثوانٍ
  const tipIv = setInterval(() => {
    tipIdx = (tipIdx + 1) % tips.length;
    tip.style.opacity = 0;
    setTimeout(() => { tip.textContent = tips[tipIdx]; tip.style.opacity = 1; }, 300);
  }, 6000);

  // نحسب المهلة الصحيحة محليًا من عدد القطع (نفس معادلة الخادم)
  // الأساس + (عدد القطع - 1) × لكل قطعة، بحد أقصى — حتى لا يقفز العداد لاحقًا
  const partsCount = (window.requestedParts || []).length || 1;
  const base = META.countdown || 90;
  const perItem = META.countdownPerItem || 30;
  const maxCd = META.countdownMax || 240;
  let lastShown = Math.min(base + (partsCount - 1) * perItem, maxCd);
  counter.textContent = lastShown;

  async function poll() {
    const st = await checkOffersReady();
    if (st) {
      if (st.ready) { // جاهز — اعرض النتائج فورًا
        clearInterval(iv); clearInterval(tipIv);
        counter.textContent = '✓';
        tip.textContent = LANG === 'en' ? '🎉 Offers arrived! Loading...' : '🎉 وصلت العروض! جارٍ العرض...';
        setTimeout(showResults, 800);
        return;
      }
      // حدّث العداد بالوقت المتبقي الحقيقي من الخادم
      if (typeof st.seconds_left === 'number') {
        lastShown = st.seconds_left;
        counter.textContent = lastShown > 0 ? lastShown : 0;
      }
    }
  }

  // عدّ تنازلي محلي سلس كل ثانية + مزامنة مع الخادم كل 4 ثوانٍ
  let tick = 0;
  const iv = setInterval(async () => {
    tick++;
    lastShown = Math.max(0, lastShown - 1);
    counter.textContent = lastShown;
    if (tick % 4 === 0 || lastShown <= 0) {
      await poll();
    }
    if (lastShown <= 0) {
      // انتهى الوقت محليًا — تحقق نهائي ثم اعرض
      const st = await checkOffersReady();
      clearInterval(iv); clearInterval(tipIv);
      showResults();
    }
  }, 1000);

  // فحص مبكر فوري (لو ردّ الجميع بسرعة)
  poll();
}

let currentRequestId = null;
let basketData = null;
let itemOffers = {};   // itemId -> offers[]
let selectedMode = 'basket';
let basketChoice = null;       // supplier_id المختار في وضع السلة
let itemChoices = {};          // itemId -> offer_id في وضع التوزيع

async function showResults() {
  document.getElementById('countdownStage').classList.add('hidden');
  document.getElementById('resultsStage').classList.remove('hidden');

  // جلب السلال (تغطية كل مورد) + عروض كل قطعة
  basketData = await (await fetch('/api/requests/' + currentRequestId + '/supplier-baskets')).json();
  for (const itemId of currentItemIds) {
    itemOffers[itemId] = await (await fetch('/api/items/' + itemId + '/offers')).json();
  }
  setMode('basket', document.getElementById('modeBasket'));
}

function setMode(mode, btn) {
  selectedMode = mode;
  document.getElementById('modeBasket').classList.toggle('btn', mode!=='basket');
  document.getElementById('modeItem').classList.toggle('btn', mode!=='item');
  document.getElementById('basketView').classList.toggle('hidden', mode!=='basket');
  document.getElementById('itemView').classList.toggle('hidden', mode!=='item');
  document.getElementById('confirmBtn').classList.remove('hidden');
  if (mode === 'basket') renderBaskets(); else renderItems();
}

function renderBaskets() {
  const v = document.getElementById('basketView');
  if (!basketData.baskets.length) { v.innerHTML = `<p class="muted">${t('noOffersYet')}</p>`; return; }
  v.innerHTML = basketData.baskets.map(b => `
    <div class="offer ${basketChoice===b.supplier_id?'best':''}" onclick="pickBasket(${b.supplier_id})" style="cursor:pointer;flex-direction:column;align-items:stretch;gap:6px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="price">${b.sum} ${t('currency')}</div>
        ${basketChoice===b.supplier_id?`<span class="badge">${t('selected')}</span>`:''}
      </div>
      <div class="meta">${t('coversParts')} ${b.covered} ${t('ofParts')} ${b.total_items} ${t('partsUnit')} · ${t('rating')} ${b.rating||'—'}</div>
    </div>`).join('');
}

function pickBasket(sid) { basketChoice = sid; renderBaskets(); }

function renderItems() {
  const v = document.getElementById('itemView');
  let html = '';
  currentItemIds.forEach((itemId, idx) => {
    const offers = itemOffers[itemId] || [];
    html += `<div class="item-result"><h3>${t('partLabel')} ${idx+1}</h3>`;
    if (!offers.length) html += `<p class="muted" style="font-size:14px">${t('noOffers')}</p>`;
    else offers.forEach((o,i) => {
      html += `<div class="offer ${itemChoices[itemId]===o.id?'best':''}" onclick="pickItem(${itemId},${o.id})" style="cursor:pointer">
        <div><div class="price">${o.price} ${t('currency')} ${i===0?`<span class="badge">${t('cheapest')}</span>`:''}</div>
        <div class="meta">${t('reply')} ${o.reply_seconds}${t('secShort')} · ${t('rating')} ${o.avg_rating||'—'}</div></div>
        ${itemChoices[itemId]===o.id?`<span class="badge">${t('selected')}</span>`:''}</div>`;
    });
    html += '</div>';
  });
  v.innerHTML = html;
}

function pickItem(itemId, offerId) { itemChoices[itemId] = offerId; renderItems(); }

async function confirmChoice() {
  let choices = [];
  if (selectedMode === 'basket') {
    if (!basketChoice) { alert(t('alertChooseSupplier')); return; }
    // كل قطع المورد المختار من عروضه
    for (const itemId of currentItemIds) {
      const o = (itemOffers[itemId]||[]).find(of => of.supplier_id === basketChoice);
      if (o) choices.push({ item_id: itemId, offer_id: o.id });
    }
  } else {
    choices = Object.entries(itemChoices).map(([item_id, offer_id]) => ({ item_id: +item_id, offer_id }));
    if (!choices.length) { alert(t('alertChooseOffer')); return; }
  }
  const res = await fetch('/api/requests/choose', {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ choices }),
  });
  const data = await res.json();
  if (data.error) { alert(data.error); return; }
  const names = data.winners.map(w => `${w.name} (${w.items_won} ${t('partsUnit')})`).join(LANG === 'en' ? ', ' : '، ');
  const orderLine = data.order_number
    ? `<p style="margin-top:6px;color:var(--navy);font-weight:600">${t('yourOrderNo')} ${data.order_number}</p>` : '';
  document.getElementById('resultsStage').innerHTML =
    `<div class="card" style="text-align:center"><h2 style="color:var(--accent)">${t('orderConfirmed')}</h2>
     <p style="margin-top:10px">${t('willContactYou')}: ${names}</p>
     ${orderLine}
     <p class="muted" style="margin-top:8px">${t('contactViaWa')}</p>
     <button class="btn" onclick="resetToStart()" style="margin-top:18px">${t('newPartRequest')}</button>
     </div>`;
}

// إعادة الصفحة لبدايتها لطلب جديد
function resetToStart() {
  // نخفي كل المراحل ونعيد بناء النموذج نظيفًا
  document.getElementById('resultsStage').classList.add('hidden');
  document.getElementById('countdownStage').classList.add('hidden');
  document.getElementById('formStage').classList.remove('hidden');
  // تفريغ القطع وإعادة قطعة واحدة فارغة
  itemCounter = 0;
  document.getElementById('itemsContainer').innerHTML = '';
  addItem();
  // تفريغ بيانات السيارة
  ['model','year','vin'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  currentRequestId = null; currentItemIds = []; itemChoices = {}; basketChoice = null;
  // إزالة ?order= من الرابط حتى لا يُعاد فتح نفس الطلب
  if (location.search) history.replaceState(null, '', location.pathname);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

loadMeta();
</script>
